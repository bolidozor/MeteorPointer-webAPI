<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeteorPointer</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e12; color: #e6e6ea;
      }
      header {
        position: sticky; top: 0; z-index: 100;
        padding: 14px 22px; border-bottom: 1px solid #26262e;
        display: flex; align-items: center; justify-content: space-between;
        background: #0e0e12;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
      header .accent { color: #ff5a5a; }
      .header-actions { display: flex; gap: 10px; align-items: center; }
      .langswitch { display: flex; border: 1px solid #3a3a46; border-radius: 8px; overflow: hidden; }
      .langswitch button { border: 0; border-radius: 0; padding: 7px 11px; font-size: 13px; background: #2a2a34; color: #e6e6ea; cursor: pointer; }
      .langswitch button.active { background: #ff5a5a; color: #15151b; font-weight: 700; }
      .langswitch button:hover:not(.active) { background: #34343f; }
      .btn {
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
        text-decoration: none; display: inline-block; white-space: nowrap;
      }
      .btn:hover { background: #34343f; }

      .page { max-width: 1100px; margin: 0 auto; padding: 28px 22px 48px; }

      /* About + stats row */
      .top-cards { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
      .card {
        background: #16161c; border: 1px solid #26262e; border-radius: 12px;
        padding: 20px 22px;
      }
      .card-about { flex: 2; min-width: 260px; }
      .card-about h2 { margin: 0 0 12px; font-size: 16px; }
      .card-about p { margin: 0 0 9px; line-height: 1.65; color: #c8c8d2; font-size: 13px; }
      .card-about p:last-child { margin-bottom: 0; }
      .card-about a { color: #7aa2ff; }
      .card-stats { flex: 1; min-width: 160px; display: flex; gap: 16px; align-items: center; justify-content: space-around; }
      .stat-box { text-align: center; }
      .stat-num { font-size: 28px; font-weight: 800; color: #ff8a5a; font-variant-numeric: tabular-nums; }
      .stat-lbl { font-size: 11px; color: #9a9aa6; text-transform: uppercase; letter-spacing: .5px; margin-top: 3px; }

      /* Sky map section */
      .sky-section {
        margin-bottom: 28px; background: #16161c; border: 1px solid #26262e; border-radius: 12px;
        display: flex; flex-direction: column; overflow: hidden;
      }
      .sky-head {
        padding: 12px 20px; font-size: 11px; color: #9a9aa6; letter-spacing: 1px;
        text-transform: uppercase; border-bottom: 1px solid #1c1c24; flex: none;
      }
      .sky-body { position: relative; }
      #skymap { width: 100%; height: 420px; overflow: hidden; }
      .sky-zoom {
        position: absolute; top: 10px; right: 12px;
        display: flex; flex-direction: column; gap: 6px; z-index: 5;
      }
      .sky-zoom button {
        width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1;
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; cursor: pointer; opacity: 0.9;
      }
      .sky-zoom button:hover { background: #34343f; }
      .sky-foot { padding: 10px 20px; border-top: 1px solid #1c1c24; }
      .legend { display: flex; gap: 16px; font-size: 12px; color: #c4c4cf; margin-bottom: 4px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      .dot.start { background: #5dff5d; } .dot.end { background: #ff3b3b; }
      .sky-caption { font-size: 11px; color: #9a9aa6; opacity: .75; }

      /* Observations table */
      .section-label { font-size: 11px; color: #9a9aa6; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 10px; }
      #homeCount { color: #9a9aa6; font-size: 12px; margin-left: 8px; font-weight: normal; }
      .table-wrap { background: #16161c; border: 1px solid #26262e; border-radius: 12px; overflow: hidden; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #1e1e26; white-space: nowrap; }
      th { color: #9a9aa6; font-weight: 600; font-size: 12px; background: #16161c; }
      td.num { font-variant-numeric: tabular-nums; }
      tbody tr { cursor: default; }
      tbody tr:hover { background: #1c1c24; }

      /* Detail icon */
      .detail-icon {
        display: inline-block; color: #9a9aa6; font-size: 14px; line-height: 1;
        text-decoration: none; padding: 2px 5px; border-radius: 4px;
        transition: color .15s, background .15s;
      }
      .detail-icon:hover { color: #e6e6ea; background: #2a2a34; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <h1>METEOR<span class="accent">POINTER</span></h1>
      <div class="header-actions">
        <div class="langswitch">
          <button data-lang="cs">CZ</button>
          <button data-lang="en">EN</button>
        </div>
        <a id="myObsBtn" href="my-observations.html" class="btn hidden" data-i18n="nav.myObs">Moje pozorování</a>
        <a id="loginBtn"  href="my-observations.html" class="btn" data-i18n="login.button">Přihlásit</a>
      </div>
    </header>

    <div class="page">

      <!-- About + stats -->
      <div class="top-cards">
        <div class="card card-about">
          <h2>Co je <span style="color:#ff5a5a">MeteorPointer</span>?</h2>
          <p data-i18n="home.about1"></p>
          <p data-i18n="home.about2"></p>
          <p data-i18n-html="home.appText"></p>
        </div>
        <div class="card card-stats">
          <div class="stat-box">
            <div class="stat-num" id="statReports">—</div>
            <div class="stat-lbl" data-i18n="home.statReports">pozorování</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="statObservers">—</div>
            <div class="stat-lbl" data-i18n="home.statObservers">pozorovatelů</div>
          </div>
        </div>
      </div>

      <!-- Sky map: all trajectories -->
      <div class="sky-section">
        <div class="sky-head" data-i18n="sky.head">Obloha v čase a místě měření</div>
        <div class="sky-body">
          <div id="skymap"></div>
          <div class="sky-zoom">
            <button data-zoom="in">+</button>
            <button data-zoom="out">−</button>
            <button data-zoom="reset">⟳</button>
          </div>
        </div>
        <div class="sky-foot">
          <div class="legend">
            <span><span class="dot start"></span><span data-i18n="sky.start">začátek stopy</span></span>
            <span><span class="dot end"></span><span data-i18n="sky.end">konec stopy</span></span>
          </div>
          <div class="sky-caption" data-i18n="sky.allHint"></div>
        </div>
      </div>

      <!-- Observations table -->
      <p class="section-label">
        <span data-i18n="home.recentTitle">Poslední pozorování</span>
        <span id="homeCount"></span>
      </p>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="grid.received">Přijato</th>
              <th data-i18n="grid.observer">Pozorovatel</th>
              <th data-i18n="grid.constellation">Souhvězdí</th>
              <th data-i18n="grid.quality">Kvalita</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="homeRows"></tbody>
        </table>
      </div>

    </div><!-- .page -->

    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="sky.js"></script>
    <script src="home.js"></script>
  </body>
</html>
