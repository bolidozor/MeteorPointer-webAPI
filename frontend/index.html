<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeteorPointer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e12; color: #e6e6ea;
      }
      header {
        padding: 14px 22px; border-bottom: 1px solid #26262e;
        display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; background: #0e0e12; z-index: 10;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
      header h1 a { color: inherit; text-decoration: none; }
      header .accent { color: #ff5a5a; }
      .header-actions { display: flex; gap: 10px; align-items: center; }
      .langswitch { display: flex; border: 1px solid #3a3a46; border-radius: 8px; overflow: hidden; }
      .langswitch button { border: 0; border-radius: 0; padding: 7px 11px; font-size: 13px; background: #2a2a34; color: #e6e6ea; cursor: pointer; }
      .langswitch button.active { background: #ff5a5a; color: #15151b; font-weight: 700; }
      .langswitch button:hover:not(.active) { background: #34343f; }
      .btn {
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
        text-decoration: none; display: inline-block; white-space: nowrap;
      }
      .btn:hover { background: #34343f; }

      main { max-width: 900px; margin: 0 auto; padding: 32px 24px 64px; }

      .card {
        background: #16161c; border: 1px solid #26262e; border-radius: 14px;
        padding: 28px 32px; margin-bottom: 28px;
      }
      .card h2 { margin: 0 0 14px; font-size: 20px; }
      .card p { margin: 0 0 10px; line-height: 1.65; color: #c8c8d2; font-size: 14px; }
      .card p:last-child { margin-bottom: 0; }
      .card a { color: #7aa2ff; }
      .accent { color: #ff5a5a; }

      /* Stats */
      .stats-row { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 4px; }
      .stat-box {
        flex: 1; min-width: 120px; background: #0e0e12; border: 1px solid #26262e;
        border-radius: 10px; padding: 16px 20px; text-align: center;
      }
      .stat-num { font-size: 32px; font-weight: 800; color: #ff8a5a; font-variant-numeric: tabular-nums; }
      .stat-lbl { font-size: 12px; color: #9a9aa6; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

      /* Observations section */
      .section-head {
        display: flex; align-items: baseline; justify-content: space-between;
        margin-bottom: 14px;
      }
      .section-head h2 { margin: 0; font-size: 17px; }
      .section-head .muted { color: #9a9aa6; font-size: 13px; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #1e1e26; white-space: nowrap; }
      th { color: #9a9aa6; font-weight: 600; }
      td.num { font-variant-numeric: tabular-nums; }
      tbody tr:hover td { background: #1c1c24; cursor: pointer; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #2a2a34; }
      .muted { color: #9a9aa6; font-size: 14px; }

      /* Map */
      #obsMap { height: 340px; border-radius: 10px; margin-bottom: 28px; background: #12121a; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="index.html">METEOR<span class="accent">POINTER</span></a></h1>
      <div class="header-actions">
        <div class="langswitch">
          <button data-lang="cs">CZ</button>
          <button data-lang="en">EN</button>
        </div>
        <a id="myObsBtn" href="my-observations.html" class="btn hidden" data-i18n="nav.myObs">Moje pozorování</a>
        <a id="loginBtn"  href="my-observations.html" class="btn" data-i18n="login.button">Přihlásit</a>
      </div>
    </header>

    <main>
      <!-- About -->
      <div class="card">
        <h2>Co je <span class="accent">MeteorPointer</span>?</h2>
        <p data-i18n="home.about1"></p>
        <p data-i18n="home.about2"></p>
      </div>

      <!-- Get the app -->
      <div class="card">
        <h2 data-i18n="home.appTitle">Kde získat aplikaci?</h2>
        <p data-i18n-html="home.appText"></p>
      </div>

      <!-- Statistics -->
      <div class="card">
        <h2 data-i18n="home.statsTitle">Statistiky</h2>
        <div class="stats-row">
          <div class="stat-box">
            <div class="stat-num" id="statReports">—</div>
            <div class="stat-lbl" data-i18n="home.statReports">pozorování</div>
          </div>
          <div class="stat-box">
            <div class="stat-num" id="statObservers">—</div>
            <div class="stat-lbl" data-i18n="home.statObservers">pozorovatelů</div>
          </div>
        </div>
      </div>

      <!-- Map of observations -->
      <div class="section-head" style="margin-top:4px">
        <h2 data-i18n="home.recentTitle">Poslední pozorování</h2>
        <span class="muted" id="homeCount"></span>
      </div>
      <div id="obsMap"></div>

      <!-- Recent observations table -->
      <table>
        <thead>
          <tr>
            <th data-i18n="grid.received">Přijato</th>
            <th data-i18n="grid.observer">Pozorovatel</th>
            <th data-i18n="grid.constellation">Souhvězdí</th>
            <th data-i18n="grid.quality">Kvalita</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="homeRows"></tbody>
      </table>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="home.js"></script>
  </body>
</html>
