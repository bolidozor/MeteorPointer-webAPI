<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeteorPointer</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e12; color: #e6e6ea;
      }
      header {
        padding: 18px 24px; border-bottom: 1px solid #26262e;
        display: flex; align-items: center; justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
      header .accent { color: #ff5a5a; }
      main { max-width: 1000px; margin: 0 auto; padding: 24px; }
      .card {
        background: #16161c; border: 1px solid #26262e; border-radius: 12px;
        padding: 24px; margin-bottom: 20px;
      }
      .code {
        font-size: 40px; font-weight: 800; letter-spacing: 6px; text-align: center;
        color: #ff8a5a; margin: 16px 0; font-variant-numeric: tabular-nums;
      }
      .qrwrap { text-align: center; margin: 18px 0; }
      .qrbox { background: #fff; padding: 16px; border-radius: 12px; display: inline-block; }
      .qrbox img { display: block; width: 320px; height: 320px; image-rendering: pixelated; }
      .muted { color: #9a9aa6; font-size: 14px; }
      .status { margin-top: 10px; font-size: 14px; }
      button {
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #34343f; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #23232b; white-space: nowrap; }
      th { color: #9a9aa6; font-weight: 600; }
      td.num { font-variant-numeric: tabular-nums; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #2a2a34; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>METEOR<span class="accent">POINTER</span></h1>
      <button id="logout" class="hidden">Odhlásit</button>
    </header>
    <main>
      <!-- Login -->
      <section id="login" class="card hidden">
        <h2>Přihlášení přes mobilní aplikaci</h2>
        <p class="muted">V aplikaci klepni <b>Autorizovat web</b>, pak <b>Skenovat QR</b> a namiř na kód níže — nebo kód opiš ručně:</p>
        <div class="qrwrap"><div class="qrbox"><img id="qr" alt="QR kód" /></div></div>
        <div class="code" id="userCode">····-····</div>
        <p class="status muted" id="loginStatus">Čekám na potvrzení v aplikaci…</p>
      </section>

      <!-- Measurements grid -->
      <section id="app" class="card hidden">
        <p class="muted">Přihlášen jako zařízení <b id="deviceId"></b> — <span id="count"></span> měření</p>
        <div style="overflow-x:auto">
          <table>
            <thead>
              <tr>
                <th>Přijato</th><th>Stav</th>
                <th>Start ALT/AZ</th><th>Konec ALT/AZ</th>
                <th>Kvalita</th><th>GPS</th><th>±m</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
