<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeteorPointer</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e12; color: #e6e6ea;
        display: flex; flex-direction: column; height: 100vh; overflow: hidden;
      }
      header {
        flex: none; padding: 14px 22px; border-bottom: 1px solid #26262e;
        display: flex; align-items: center; justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
      header .accent { color: #ff5a5a; }
      .header-actions { display: flex; gap: 10px; align-items: center; }
      .langswitch { display: flex; border: 1px solid #3a3a46; border-radius: 8px; overflow: hidden; }
      .langswitch button { border: 0; border-radius: 0; padding: 7px 11px; font-size: 13px; }
      .langswitch button.active { background: #ff5a5a; color: #15151b; font-weight: 700; }
      button {
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
      }
      button:hover { background: #34343f; }
      .langswitch button.active:hover { background: #ff6e6e; }

      main { flex: 1; min-height: 0; display: flex; }

      /* login fills the page when signed out */
      #login { margin: auto; max-width: 460px; }
      .card { background: #16161c; border: 1px solid #26262e; border-radius: 12px; padding: 24px; }
      .code { font-size: 40px; font-weight: 800; letter-spacing: 6px; text-align: center; color: #ff8a5a; margin: 16px 0; font-variant-numeric: tabular-nums; }
      .qrwrap { text-align: center; margin: 18px 0; }
      .qrbox { background: #fff; padding: 16px; border-radius: 12px; display: inline-block; }
      .qrbox img { display: block; width: 300px; height: 300px; image-rendering: pixelated; }
      .muted { color: #9a9aa6; font-size: 14px; }
      .status { margin-top: 10px; font-size: 14px; }

      /* signed-in: grid (left, content width, own scroll) + sky (right, fills rest) */
      #app { flex: 1; min-height: 0; display: flex; }
      .col-grid { flex: none; max-width: 60%; overflow: auto; border-right: 1px solid #26262e; }
      .grid-inner { padding: 16px 20px; }
      .col-sky { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }
      .sky-head { flex: none; padding: 12px 20px; font-size: 12px; color: #9a9aa6; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #1c1c24; }
      #skymap { flex: 1; min-height: 0; width: 100%; overflow: hidden; }
      .sky-zoom { position: absolute; top: 46px; right: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
      .sky-zoom button { width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1; opacity: 0.9; }
      .sky-foot { flex: none; padding: 12px 20px; border-top: 1px solid #1c1c24; }
      .legend { display: flex; gap: 16px; font-size: 12px; color: #c4c4cf; margin-bottom: 8px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
      .dot.start { background: #5dff5d; } .dot.end { background: #ff3b3b; }
      .sky-caption { line-height: 1.5; font-size: 13px; }

      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #23232b; white-space: nowrap; }
      th { color: #9a9aa6; font-weight: 600; position: sticky; top: 0; background: #16161c; }
      td.num { font-variant-numeric: tabular-nums; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #2a2a34; }
      tbody tr { cursor: pointer; }
      tbody tr:hover { background: #1c1c24; }
      tbody tr.selected { background: #2a1622; }
      tbody tr.selected td:first-child { box-shadow: inset 3px 0 0 #ff5a5a; }

      .hidden { display: none !important; }

      .modal { position: fixed; inset: 0; background: rgba(0,0,0,.72); display: flex; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
      .modal-box { background: #16161c; border: 1px solid #2c2c36; border-radius: 14px; max-width: 680px; width: 100%; max-height: 84vh; overflow: auto; padding: 28px; }
      .modal-box h2 { margin: 0 0 4px; font-size: 20px; }
      .modal-box h3 { margin: 22px 0 8px; font-size: 14px; color: #ff8a5a; letter-spacing: .5px; }
      .modal-box p, .modal-box li { font-size: 13px; line-height: 1.6; color: #c8c8d2; }
      .modal-box ul { margin: 6px 0; padding-left: 18px; }
      .modal-box a { color: #7aa2ff; }
      .modal-foot { margin-top: 22px; text-align: right; }
    </style>
  </head>
  <body>
    <header>
      <h1>METEOR<span class="accent">POINTER</span></h1>
      <div class="header-actions">
        <div class="langswitch">
          <button data-lang="cs">CZ</button>
          <button data-lang="en">EN</button>
        </div>
        <button id="about" data-i18n="about">O aplikaci</button>
        <button id="logout" class="hidden" data-i18n="logout">Odhlásit</button>
      </div>
    </header>

    <main>
      <!-- Login -->
      <section id="login" class="card hidden">
        <h2 data-i18n="login.heading">Přihlášení přes mobilní aplikaci</h2>
        <p class="muted" data-i18n-html="login.howto"></p>
        <div class="qrwrap"><div class="qrbox"><img id="qr" alt="QR" /></div></div>
        <div class="code" id="userCode">····-····</div>
        <p class="status muted" id="loginStatus" data-i18n="login.waiting"></p>
      </section>

      <!-- Grid + sky -->
      <div id="app" class="hidden">
        <div class="col-grid">
          <div class="grid-inner">
            <p class="muted" id="gridIntro"></p>
            <table>
              <thead>
                <tr>
                  <th data-i18n="grid.received">Přijato</th>
                  <th data-i18n="grid.status">Stav</th>
                  <th data-i18n="grid.startAltAz">Start ALT/AZ</th>
                  <th data-i18n="grid.endAltAz">Konec ALT/AZ</th>
                  <th data-i18n="grid.quality">Kvalita</th>
                  <th data-i18n="grid.gps">GPS</th>
                  <th data-i18n="grid.acc">±m</th>
                </tr>
              </thead>
              <tbody id="rows"></tbody>
            </table>
          </div>
        </div>
        <div class="col-sky">
          <div class="sky-head" data-i18n="sky.head">Obloha v čase a místě měření</div>
          <div class="sky-zoom">
            <button data-zoom="in" title="+">+</button>
            <button data-zoom="out" title="−">−</button>
            <button data-zoom="reset" title="reset">⟳</button>
          </div>
          <div id="skymap"></div>
          <div class="sky-foot">
            <div class="legend">
              <span><span class="dot start"></span><span data-i18n="sky.start">začátek stopy</span></span>
              <span><span class="dot end"></span><span data-i18n="sky.end">konec stopy</span></span>
            </div>
            <div class="sky-caption muted" id="skyCaption" data-i18n="sky.pick"></div>
            <div class="muted" style="font-size:11px;margin-top:6px;opacity:.7" data-i18n="sky.hint"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- About / licenses -->
    <div id="aboutModal" class="modal hidden">
      <div class="modal-box">
        <h2>METEOR<span style="color:#ff5a5a">POINTER</span></h2>
        <p class="muted" data-i18n-html="about_box.tagline"></p>
        <h3 data-i18n="about_box.compH"></h3>
        <p data-i18n="about_box.compIntro"></p>
        <ul>
          <li data-i18n-html="about_box.liStars"></li>
          <li data-i18n-html="about_box.liSegno"></li>
          <li data-i18n-html="about_box.liTz"></li>
          <li data-i18n-html="about_box.liDjango"></li>
        </ul>
        <h3 data-i18n="about_box.coordsH"></h3>
        <p data-i18n="about_box.coords"></p>
        <div class="modal-foot"><button id="aboutClose" data-i18n="about_box.close">Zavřít</button></div>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="sky.js"></script>
    <script src="app.js"></script>
  </body>
</html>
