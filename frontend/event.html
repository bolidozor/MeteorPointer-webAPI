<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MeteorPointer — Detail</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0e0e12; color: #e6e6ea;
        display: flex; flex-direction: column; height: 100vh; overflow: hidden;
      }
      header {
        flex: none; padding: 14px 22px; border-bottom: 1px solid #26262e;
        display: flex; align-items: center; justify-content: space-between;
      }
      header h1 { font-size: 18px; margin: 0; letter-spacing: 2px; }
      header h1 a { color: inherit; text-decoration: none; }
      header .accent { color: #ff5a5a; }
      .header-actions { display: flex; gap: 10px; align-items: center; }
      .langswitch { display: flex; border: 1px solid #3a3a46; border-radius: 8px; overflow: hidden; }
      .langswitch button { border: 0; border-radius: 0; padding: 7px 11px; font-size: 13px; background: #2a2a34; color: #e6e6ea; cursor: pointer; }
      .langswitch button.active { background: #ff5a5a; color: #15151b; font-weight: 700; }
      .langswitch button:hover:not(.active) { background: #34343f; }
      button, .btn {
        background: #2a2a34; color: #e6e6ea; border: 1px solid #3a3a46;
        border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer;
        text-decoration: none; display: inline-block;
      }
      button:hover, .btn:hover { background: #34343f; }

      main { flex: 1; min-height: 0; display: flex; }

      /* Left: detail info */
      .col-detail {
        flex: none; width: 340px; overflow-y: auto;
        border-right: 1px solid #26262e; padding: 24px 22px;
      }
      .col-detail h2 { margin: 0 0 18px; font-size: 16px; color: #9a9aa6; letter-spacing: 1px; text-transform: uppercase; }
      .detail-row { margin-bottom: 14px; font-size: 13px; line-height: 1.5; }
      .detail-label { color: #9a9aa6; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
      .detail-val { color: #e6e6ea; }
      .detail-val.num { font-variant-numeric: tabular-nums; }
      .pill { padding: 2px 8px; border-radius: 999px; font-size: 11px; background: #2a2a34; }
      .muted { color: #9a9aa6; }
      .error { padding: 32px; color: #ff8a8a; font-size: 14px; }

      /* Right: sky map */
      .col-sky { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }
      .sky-head { flex: none; padding: 12px 20px; font-size: 12px; color: #9a9aa6; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #1c1c24; }
      #skymap { flex: 1; min-height: 0; width: 100%; overflow: hidden; }
      .sky-zoom { position: absolute; top: 46px; right: 14px; display: flex; flex-direction: column; gap: 6px; z-index: 5; }
      .sky-zoom button { width: 34px; height: 34px; padding: 0; font-size: 18px; line-height: 1; border: 1px solid #3a3a46; }
      .sky-foot { flex: none; padding: 10px 20px; border-top: 1px solid #1c1c24; }
      .legend { display: flex; gap: 16px; font-size: 12px; color: #c4c4cf; margin-bottom: 6px; }
      .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
      .dot.start { background: #5dff5d; } .dot.end { background: #ff3b3b; }
      .sky-hint { font-size: 11px; color: #9a9aa6; opacity: .7; }

      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <header>
      <h1><a href="index.html">METEOR<span class="accent">POINTER</span></a></h1>
      <div class="header-actions">
        <a href="index.html" class="btn" data-i18n="nav.home">Domů</a>
        <a href="javascript:history.back()" class="btn" data-i18n="event.back">← Zpět</a>
        <div class="langswitch">
          <button data-lang="cs">CZ</button>
          <button data-lang="en">EN</button>
        </div>
      </div>
    </header>

    <main>
      <div class="col-detail" id="detail">
        <p class="muted" style="font-size:13px" data-i18n="event.loading">Načítám…</p>
      </div>
      <div class="col-sky">
        <div class="sky-head" data-i18n="sky.head">Obloha v čase a místě měření</div>
        <div class="sky-zoom">
          <button data-zoom="in">+</button>
          <button data-zoom="out">−</button>
          <button data-zoom="reset">⟳</button>
        </div>
        <div id="skymap"></div>
        <div class="sky-foot">
          <div class="legend">
            <span><span class="dot start"></span><span data-i18n="sky.start">začátek stopy</span></span>
            <span><span class="dot end"></span><span data-i18n="sky.end">konec stopy</span></span>
          </div>
          <div class="sky-hint" data-i18n="sky.hint"></div>
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script src="i18n.js"></script>
    <script src="sky.js"></script>
    <script src="event.js"></script>
  </body>
</html>
