# ╔══════════════════════════════════════════════════════════════════════════╗
# ║ VARIANT 1 — TLS handled by a host / NAS reverse proxy (no proxy in stack)  ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# WHEN TO USE
#   You already run a reverse proxy on the host or NAS (Nginx Proxy Manager,
#   Traefik, Caddy, Synology, …) that terminates HTTPS and manages certificates.
#
# WHAT YOU GET
#   2 containers: MeteorPointer-DB + MeteorPointer-API. The API serves plain
#   HTTP on :8000; your host/NAS proxy adds TLS in front of it. Django trusts the
#   proxy's X-Forwarded-Proto header (SECURE_PROXY_SSL_HEADER).
#
# HOW TO USE
#   1) cp .env.example .env   and fill in the "Common" + "Variant 1" sections.
#   2) docker compose -f docker-compose.prod.yml up -d
#   3) On your host/NAS proxy, route your domain -> this machine's API port
#      (default 0.0.0.0:8000; set API_BIND=127.0.0.1:8000 to expose it only to a
#      proxy running on this same host).
#   Logs:  docker compose -f docker-compose.prod.yml logs -f api
#   Stop:  docker compose -f docker-compose.prod.yml down
#
# For TLS handled INSIDE the stack instead, use docker-compose.tls.yml (Variant 2).

name: meteorpointer

x-api-env: &api-env
  DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set in .env}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
  DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
  DOMAIN: ${DOMAIN:-}
  JWT_SECRET: ${JWT_SECRET:?set in .env}
  POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
  POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

services:
  db:
    image: postgres:16-alpine
    container_name: MeteorPointer-DB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
      POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - meteorpointer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meteorpointer} -d ${POSTGRES_DB:-meteorpointer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ghcr.io/bolidozor/meteorpointer-api:${API_TAG:-latest}
    container_name: MeteorPointer-API
    environment:
      <<: *api-env
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Default 0.0.0.0:8000. Set API_BIND=127.0.0.1:8000 in .env so only a
      # host proxy on this machine can reach the API.
      - "${API_BIND:-8000}:8000"
    restart: unless-stopped

volumes:
  meteorpointer_db_data:
