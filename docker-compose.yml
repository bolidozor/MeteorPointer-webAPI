# MeteorPointer — Docker Compose (dev)
# Containers: MeteorPointer-DB (postgres) + MeteorPointer-API.
# The web frontend (MeteorPointer-FE) is added later.
#
#   docker compose up -d
#   docker compose logs -f api

name: meteorpointer

x-api-env: &api-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-secret-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,api}
  JWT_SECRET: ${JWT_SECRET:-insecure-dev-jwt-secret-change-me}
  POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
  POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meteorpointer}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

services:
  db:
    image: postgres:16-alpine
    container_name: MeteorPointer-DB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
      POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meteorpointer}
    volumes:
      - meteorpointer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meteorpointer} -d ${POSTGRES_DB:-meteorpointer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ghcr.io/bolidozor/meteorpointer-api:dev
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: MeteorPointer-API
    environment:
      <<: *api-env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  meteorpointer_db_data:
