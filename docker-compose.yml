# MeteorPointer — Docker Compose (dev)
# Containers: MeteorPointer-DB (postgres) + MeteorPointer-API + MeteorPointer-FE
# (the login-test frontend). Builds the API from source so it has the latest code.
#
#   docker compose up -d --build
#   API:  http://localhost:8000     FE: http://localhost:8080

name: meteorpointer

x-api-env: &api-env
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-secret-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
  JWT_SECRET: ${JWT_SECRET:-insecure-dev-jwt-secret-change-me}
  # Allow the login-test frontend (served on :8080) to call the API with cookies.
  DJANGO_CORS_ORIGINS: ${DJANGO_CORS_ORIGINS:-}
  POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
  POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meteorpointer}
  POSTGRES_HOST: db
  POSTGRES_PORT: 5432

services:
  db:
    image: postgres:16-alpine
    container_name: MeteorPointer-DB
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meteorpointer}
      POSTGRES_USER: ${POSTGRES_USER:-meteorpointer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meteorpointer}
    volumes:
      - meteorpointer_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meteorpointer} -d ${POSTGRES_DB:-meteorpointer}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    image: ghcr.io/bolidozor/meteorpointer-api:dev
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: MeteorPointer-API
    environment:
      <<: *api-env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  fe:
    build:
      context: .
      dockerfile: docker/fe/Dockerfile
      args:
        # Dev: FE on :8080 talks to the API on :8000 directly (no /api prefix,
        # no proxy). Production builds keep the default `/api`.
        API_BASE: http://localhost:8000
    container_name: MeteorPointer-FE
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  meteorpointer_db_data:
